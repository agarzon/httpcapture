name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo_sqlite

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run linter
        run: composer lint

      - name: Run tests
        run: composer test
